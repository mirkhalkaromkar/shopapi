name: Deploy ShopAPI

on:
  push:
    branches: [main]
  workflow_dispatch:    # allow manual trigger from GitHub UI

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest

    permissions:
      id-token: write   # required for OIDC
      contents: read

    steps:
      # ── 1. Checkout code ────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Authenticate with AWS via OIDC ───────────────
      # No long-lived credentials — GitHub assumes IAM role
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ap-south-1

      # ── 3. Find EC2 instance ID by tag ──────────────────
      - name: Get EC2 instance ID
        id: get_instance
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters \
              "Name=tag:Project,Values=shopapi" \
              "Name=tag:Env,Values=dev" \
              "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --output text \
            --region ap-south-1)
          echo "instance_id=$INSTANCE_ID" >> $GITHUB_OUTPUT
          echo "Deploying to: $INSTANCE_ID"

      # ── 4. Deploy via SSM ────────────────────────────────
      # No SSH key needed — SSM agent on EC2 handles this
      - name: Deploy to EC2
        run: |
          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "${{ steps.get_instance.outputs.instance_id }}" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "echo === Deploy started at $(date) ===",
              "cd /home/ec2-user/shopapi/shopapi",
              "git pull origin main",
              "npm install --omit=dev",
              "systemctl restart shopapi",
              "systemctl restart shopapi-worker",
              "sleep 5",
              "curl -sf http://localhost:3000/health && echo === Deploy successful === || echo === Health check failed ==="
            ]' \
            --region ap-south-1 \
            --query "Command.CommandId" \
            --output text)
          echo "SSM Command ID: $COMMAND_ID"
          echo "command_id=$COMMAND_ID" >> $GITHUB_ENV

      # ── 5. Wait and check result ─────────────────────────
      - name: Check deployment result
        run: |
          sleep 30
          STATUS=$(aws ssm get-command-invocation \
            --command-id "$command_id" \
            --instance-id "${{ steps.get_instance.outputs.instance_id }}" \
            --region ap-south-1 \
            --query "Status" \
            --output text)

          OUTPUT=$(aws ssm get-command-invocation \
            --command-id "$command_id" \
            --instance-id "${{ steps.get_instance.outputs.instance_id }}" \
            --region ap-south-1 \
            --query "StandardOutputContent" \
            --output text)

          echo "=== Deployment Output ==="
          echo "$OUTPUT"
          echo "=== Status: $STATUS ==="

          if [ "$STATUS" != "Success" ]; then
            echo "Deployment failed!"
            exit 1
          fi
