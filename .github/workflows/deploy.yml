name: Deploy ShopAPI

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:

  # ── Job 1: Deploy backend to EC2 via SSM ────────────────
  deploy-backend:
    name: Deploys Backend
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ap-south-1

      - name: Deploy backend via SSM
        run: |
          # Find running instances in ASG by tag
          INSTANCE_IDS=$(aws ec2 describe-instances \
            --filters \
              "Name=tag:Project,Values=shopapi" \
              "Name=tag:Env,Values=dev" \
              "Name=instance-state-name,Values=running" \
            --query "Reservations[*].Instances[*].InstanceId" \
            --output text \
            --region ap-south-1)

          echo "Deploying to instances: $INSTANCE_IDS"

          for INSTANCE_ID in $INSTANCE_IDS; do
            echo "Deploying to $INSTANCE_ID..."
            COMMAND_ID=$(aws ssm send-command \
              --instance-ids "$INSTANCE_ID" \
              --document-name "AWS-RunShellScript" \
              --parameters 'commands=[
                "cd /home/ec2-user/shopapi/shopapi",
                "git pull origin main",
                "npm install --omit=dev",
                "systemctl restart shopapi shopapi-worker",
                "sleep 5",
                "curl -sf http://localhost:3000/health && echo OK"
              ]' \
              --region ap-south-1 \
              --query "Command.CommandId" \
              --output text)
            echo "Command ID: $COMMAND_ID"

            sleep 20
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$INSTANCE_ID" \
              --region ap-south-1 \
              --query "Status" \
              --output text)

            echo "Status for $INSTANCE_ID: $STATUS"
            [ "$STATUS" = "Success" ] || exit 1
          done

  # ── Job 2: Build and deploy React frontend to S3 ────────
  deploy-frontend:
    name: Deploy Frontend
    runs-on: ubuntu-latest
    needs: deploy-backend
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ap-south-1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install and build frontend
        working-directory: ./frontend
        env:
          REACT_APP_API_URL: ${{ vars.CLOUDFRONT_URL }}
        run: |
          npm install
          npm run build

      - name: Deploy to S3
        run: |
          aws s3 sync frontend/build/ s3://${{ secrets.FRONTEND_BUCKET }} \
            --delete \
            --region ap-south-1

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_ID }} \
            --paths "/*"

      - name: Done
        run: echo "Frontend deployed to https://$(aws cloudfront get-distribution --id ${{ secrets.CLOUDFRONT_ID }} --query 'Distribution.DomainName' --output text)"
